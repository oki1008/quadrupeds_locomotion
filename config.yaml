env_cfg:
  num_actions: 12
  # Go2の初期関節角度
  default_joint_angles:  # [rad]
    FL_hip_joint: 0.0
    FR_hip_joint: 0.0
    RL_hip_joint: 0.0
    RR_hip_joint: 0.0
    FL_thigh_joint: 0.8
    FR_thigh_joint: 0.8
    RL_thigh_joint: 1.0
    RR_thigh_joint: 1.0
    FL_calf_joint: -1.5
    FR_calf_joint: -1.5
    RL_calf_joint: -1.5
    RR_calf_joint: -1.5
  dof_names:
    - FR_hip_joint
    - FR_thigh_joint
    - FR_calf_joint
    - FL_hip_joint
    - FL_thigh_joint
    - FL_calf_joint
    - RR_hip_joint
    - RR_thigh_joint
    - RR_calf_joint
    - RL_hip_joint
    - RL_thigh_joint
    - RL_calf_joint
  # PD制御ゲイン
  kp: 20.0
  kd: 0.5
  # 転倒判定
  termination_if_roll_greater_than: 0.6  # degree→rad
  termination_if_pitch_greater_than: 0.6  # degree→rad
  # 初期姿勢
  base_init_pos: [0.0, 0.0, 0.42]
  base_init_quat: [1.0, 0.0, 0.0, 0.0]
  episode_length_s: 20.0
  resampling_time_s: 4.0
  action_scale: 0.25
  simulate_action_latency: true
  # go2_lidar4で歩けた設定を基準に、まず平地のblind歩行を安定させる
  clip_actions: 100.0
  target_dof_pos_clip: 0.8
  sim_substeps: 30

  # 地形設定: A=flat, B/C=stair, 旧go2_lidar4比較=rough
  terrain_type: "flat"
  terrain_width: 20.0
  terrain_length: 20.0
  horizontal_scale: 0.05
  stair_start_x: 0.5
  stair_end_x: 4.0
  terrain_step_width: 0.35
  terrain_step_height: 0.00 # 階段評価では0.01 -> 0.02 -> 0.03のように段階的に上げる
  start_flat_radius_cells: 20
  
  # 平地・階段評価で共通して使う初期位置範囲
  spawn_x_range: [-0.5, 0.5]
  spawn_y_range: [-0.5, 0.5]

  spawn_height_offset: 0.45
  termination_abs_min_height: 0.12
  termination_max_height: 1.2

obs_cfg:
  # blind観測: 地形高さを入れず、48次元の自己状態を3フレーム履歴化する
  num_obs: 144
  obs_scales:
    lin_vel: 2.0
    ang_vel: 0.25
    dof_pos: 1.0
    dof_vel: 0.05
    height_measurements: 5.0

reward_cfg:
  tracking_sigma: 0.25
  # go2_lidar4で歩けた基準高さ。まず安定歩行を優先する。
  base_height_target: 0.30
  feet_height_target: 0.075
  jump_upward_velocity: 1.2
  jump_reward_steps: 50
  # 報酬関数の重み
  reward_scales:
    # 罰則を増やしすぎると「動かない安全姿勢」に落ちるため、まずはシンプルにする。
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.2
    lin_vel_z: -1.0
    base_height: -1.0
    action_rate: -0.005
    similar_to_default: -0.01
    # 足を浮かせる時間。上げすぎると跳ねるため控えめにする。
    feet_air_time: 0.10
    # jump: 4.0
    # jump_height_tracking: 0.5
    # jump_height_achievement: 2.0
    # jump_speed: 1.0
    # jump_landing: 0.08

command_cfg:
  num_commands: 5  # [lin_vel_x, lin_vel_y, ang_vel, height, jump]
  # 前後・左右・旋回を混ぜて学習し、汎用的な平地歩行を作る。
  lin_vel_x_range: [-1.0, 1.0]
  lin_vel_y_range: [-0.5, 0.5]
  ang_vel_range: [-0.6, 0.6]
  height_range: [0.28, 0.38]
  # jump_range: [0.5, 1.5]
  jump_range: [0.0, 0.0]

train_cfg:
  exp_name: "go2_flat_base"
  num_envs: 4096
  max_iterations: 10000
  env: "Go2Env_Stair"
  device: "cuda:0"
