env_cfg:
  num_actions: 12
  # joint/link names
  default_joint_angles:  # [rad]
    FL_hip_joint: 0.0
    FR_hip_joint: 0.0
    RL_hip_joint: 0.0
    RR_hip_joint: 0.0
    FL_thigh_joint: 0.8
    FR_thigh_joint: 0.8
    RL_thigh_joint: 1.0
    RR_thigh_joint: 1.0
    FL_calf_joint: -1.5
    FR_calf_joint: -1.5
    RL_calf_joint: -1.5
    RR_calf_joint: -1.5
  dof_names:
    - FR_hip_joint
    - FR_thigh_joint
    - FR_calf_joint
    - FL_hip_joint
    - FL_thigh_joint
    - FL_calf_joint
    - RR_hip_joint
    - RR_thigh_joint
    - RR_calf_joint
    - RL_hip_joint
    - RL_thigh_joint
    - RL_calf_joint
  # PD
  kp: 20.0
  kd: 0.5
  # termination
  termination_if_roll_greater_than: 0.6  # degree→rad
  termination_if_pitch_greater_than: 0.6  # degree→rad
  # base pose
  base_init_pos: [0.0, 0.0, 0.42]
  base_init_quat: [1.0, 0.0, 0.0, 0.0]
  episode_length_s: 20.0
  resampling_time_s: 4.0
  action_scale: 0.25
  simulate_action_latency: true
  clip_actions: 2.0
  target_dof_pos_clip: 0.8
  sim_substeps: 4
  terrain_width: 8.0
  terrain_length: 12.0
  horizontal_scale: 0.05
  stair_start_x: -1.0
  stair_end_x: 4.0
  terrain_step_width: 0.35
  terrain_step_height: 0.03
  spawn_x_range: [-3.0, -2.0]
  spawn_y_range: [-0.5, 0.5]
  spawn_height_offset: 0.28
  termination_min_height: 0.12
  termination_max_height: 1.2

obs_cfg:
  num_obs: 507  # 48
  obs_scales:
    lin_vel: 2.0
    ang_vel: 0.25
    dof_pos: 1.0
    dof_vel: 0.05
    height_measurements: 5.0

reward_cfg:
  tracking_sigma: 0.03
  base_height_target: 0.3
  feet_height_target: 0.075
  jump_upward_velocity: 1.2
  jump_reward_steps: 50
  ##主な報酬関数の重み付け
  reward_scales:
    # 直進階段用: ロボット基準より、世界座標の+X方向へ進むことを強く評価する
    tracking_lin_vel: 0.5
    tracking_world_lin_vel_x: 8.0
    # 直進階段用: 止まって耐えるより、実際に+X方向へ進む行動を直接評価する
    forward_progress: 8.0
    tracking_ang_vel: 1.0
    # 直進階段用: 横ずれと進行方向からのyawずれを抑える
    lateral_position: -0.5
    yaw_orientation: -0.5
    lin_vel_z: -1.0
    base_height: -1.0
    termination: -10.0
    action_rate: -0.001
    similar_to_default: -0.002
    feet_air_time: 0.2
    # jump: 4.0
    # jump_height_tracking: 0.5
    # jump_height_achievement: 2.0
    # jump_speed: 1.0
    # jump_landing: 0.08

command_cfg:
  num_commands: 5  # [lin_vel_x, lin_vel_y, ang_vel, height, jump]
  lin_vel_x_range: [0.2, 0.5]
  # 直進階段用: 横移動と旋回コマンドは出さず、まず前進だけを学習させる
  lin_vel_y_range: [0.0, 0.0]
  ang_vel_range: [0.0, 0.0]
  height_range: [0.28, 0.38]
  # jump_range: [0.5, 1.5]
  jump_range: [0.0, 0.0]

train_cfg:
  exp_name: "go2_stair_straight"
  num_envs: 4096
  max_iterations: 1000
  env: "Go2Env_Stair"
  device: "cuda:0"
